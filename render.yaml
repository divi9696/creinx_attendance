services:
  # Unified Web Service (Backend + Frontend)
  - type: web
    name: creinx-attendance
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: REACT_APP_API_URL
        value: "" # Leave empty, defaults to local /api in frontend config
